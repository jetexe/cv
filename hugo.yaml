  summary:
    enable: true
    text: |-
      Staff-level Software Engineer with 10+ years of experience building distributed systems, cloud-native platforms,
      fintech products, and high-load services. Specialized in **Go**, **Kubernetes**, **Temporal**, **AWS**, and platform engineering.
      Proven track record of reducing infrastructure costs,
      leading engineering teams, and designing scalable architectures from scratch.
  experience:
    enable: true
    core:
      - Distributed Systems
      - Platform Engineering
      - Kubernetes Operators
      - Workflow Orchestration
      - High-Load Systems
      - Microservices
      - Event-Driven Architecture
      - Cloud Infrastructure
    list:
      - company: SpiralScout
        products:
          - title: Senior Software Engineer
            dates: Nov 2025 - Feb 2026 · 4 mos
            details: |-
              Designed a platform for running AI-generated code in isolated environments using Wippy Runtime.

              Integrated **Keycloak** for secure authentication and authorization, ensuring robust access control for users and services.

              Created a custom **Kubernetes** controller to manage the lifecycle of AI code execution environments, ensuring efficient resource allocation and isolation.

              Contributed to the development of a state management system that stores code generated by users.

              Created a **gRPC** API for the platform to allow users to interact with their code execution environments, including secret management.
            skills:
              - Go
              - Kubernetes
              - Temporal
              - AWS
              - PostgreSQL
              - Keycloak

          - title: Senior Go Engineer
            dates: Sep 2023 - Nov 2025 · 3 yrs 3 mos
            details: |-
              Designed and developed a media content processing platform (similar to YouTube) for a large interactive product Demo service using **Go**, **Temporal** and FFMPEG.

              Implemented a featured **Kubernetes** auto-scaling logic based on service load, node load and several custom metrics for adding more **AWS** spot instances, which resulted in a **20%** reduction in infrastructure costs, with growth of the overall performance.

              Integrated **Kafka** for real-time data streaming, enabling efficient handling of high volumes of media processing tasks and improving system responsiveness.

              Set up a several cache layers at **S3** and **CloudFron** side, which reduced the latency of media content delivery to several ms and improved user experience.

            skills:
              - Go
              - Kubernetes
              - Temporal
              - AWS
              - Kafka
              - FFMPEG

      - company: Vacuumlabs
        products:
          - title: Senior Software Engineer
            dates: Mar 2023 - Jul 2023 · 5 mos
            details: |-
              Architected and developed a **Thought Machine** smart-contract framework for core banking operations
              (loans, mortgages, savings, and deposits).
              The framework streamlined development by providing a robust testing library, utility functions,
              and standardized contract templates.
            skills:
              - Thought Machine Vault
              - Temporal
              - AWS

          - title: Software Engineer
            dates: Sep 2022 - Mar 2023 · 7 mos
            details: |-
              Building Demo neo bank from scratch using microservices architecture, technologically
              agnostic environment, and self-managed micro teams. Starting with onboarding,
              accounts, payments, and building React Native mobile applications.

              This project used as a Demo for the potential clients, so it was important to make it as stable.
            skills:
              - CI/CD
              - GitHub Actions
              - Kafka
              - AWS
              - Temporal

      - company: SpectrumData
        products:
          - title: Senior Go Developer
            dates: Jul 2020 - Aug 2022 · 2 yrs 2 mos
            details: |-
              Design and development The vehicle Insurance conveyor - a system that collects information about vehicles,
              drivers, and owners from dozens of sources and calculates insurance policy prices using AI.

              My contribution:
              Designed the platform and developed a large part of the system on **Go**, **Temporal**.

              Highlights:
              Fully **gRPC** network between the services of the conveyor. Each service of the system can
              get any part of data from the integration level, which allows to build a very flexible product.

            skills:
              - Go
              - Docker
              - gRPC
              - MongoDB
              - CI/CD
              - PostgreSQL
              - RabbitMQ
              - GitLab CI

          - title: Senior Go Developer
            dates: Dec 2019 - Jul 2020 · 8 mos
            details: >-
              Working in a R&D team analyzed a company pain points and develop the solutions.

              One of the main projects was a large-scale distributed automation infrastructure used for data collection and validation,
              reducing operational costs by **60%**.

            skills:
              - Go
              - Docker
              - CI/CD
              - Redis
              - PostgreSQL
              - RabbitMQ
              - GitlabCI

          - title: Team lead PHP/GO
            dates: Oct 2017 - Dec 2019 · 2 yrs 2 mos
            details: >-
              A vehicle information service. If you know what Carfax is, you know that the "Avtocod"
              does.

              My contribution:
              - Leading development team of 7 people
              - Developing and maintaining the website
              - Web sockets integration

            skills:
              - Docker
              - CI/CD
              - Redis
              - PostgreSQL
              - RabbitMQ
              - GitlabCI
              - Keycloak
              - Temporal
              - PHP/Laravel/RoadRunner
      - company: Previous experience
        products:
          - dates: Jun 2012 - Oct 2016 · 4 yrs 2 mos
            details: >-
              Creation of websites and e-commerce stores.

mediaTypes:
  "text/typst":
    suffixes: [ "typ" ]

outputFormats:
  TYPST:
    mediaType: "text/typst"
    baseName: "cv"
    isPlainText: true

outputs:
  home: [ "HTML", "TYPST" ]
  page: [ "HTML", "TYPST" ]

module:
  hugoVersion:
    extended: true
    min: 0.116.0
  mounts:
    - source: "assets"
      target: "assets"
    - source: "node_modules/@fortawesome/fontawesome-free/svgs"
      target: "assets/icons"
    - source: "hugo_stats.json"
      target: "assets/watching/hugo_stats.json"

build:
  buildStats:
    enable: true

disableKinds: [ "taxonomy", "term", "rss", "sitemap" ]
